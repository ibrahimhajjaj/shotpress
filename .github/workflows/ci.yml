name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci
      - run: npm test
      - run: npx playwright-core install --with-deps chromium
      - run: node --test test/e2e.test.js
        env:
          SHOTPRESS_E2E: '1'
          SHOTPRESS_NO_NETWORK: '1'
